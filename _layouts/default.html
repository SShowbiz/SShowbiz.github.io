<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
  <script data-goatcounter="https://hwkim408.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <main class="container">
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }}</p>
    <p class="visitor-count">
      <span class="visitor-pill">
        <span class="visitor-label">visits</span>
        <span class="visitor-number"><span id="gc-today">&middot;&middot;&middot;</span> <span class="visitor-sep">/</span> <span id="gc-total">&middot;&middot;&middot;</span></span>
      </span>
    </p>
    <script>
      (function () {
        const base = "https://hwkim408.goatcounter.com/counter/TOTAL.json";
        const today = new Date().toISOString().slice(0, 10);
        const fmt = n => Number(n).toLocaleString();
        fetch(base).then(r => r.json()).then(d => {
          document.getElementById("gc-total").textContent = fmt(d.count);
        }).catch(() => {});
        fetch(base + "?start=" + today).then(r => r.json()).then(d => {
          document.getElementById("gc-today").textContent = fmt(d.count);
        }).catch(() => {});
      })();
    </script>
  </footer>
</body>
</html>
